<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Love letter for Rhea Cute</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="love letter 2.css" />
  </head>
  <body>
   
     <div class="moon"></div>
    <div class="moon-left"></div>

    <div class="envlope-wrapper">
      <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        <div class="letter">
          <div class="words line1">To: Rhea Cute</div>
          <div class="words line2">Dear Rhea, I've developed feelings for you</div>
          <div class="words line3">being inlove with you inspires me everyday</div>
          <div class="words line4">I love you, love lots ;3 </div>
        </div>
        <div class="hearts">
          <div class="heart a1"></div>
          <div class="heart a2"></div>
          <div class="heart a3"></div>
        </div>
      </div>
    </div>
    <div class="reset">
      <button id="open">Open</button>
      <button id="reset">Close</button>
    </div>
    
    <div class="music-player">
      <audio controls>
        <source src="juan karlos - Buwan - (320 Kbps).mp3" type="audio/wav">
       
      </audio>
      <p>Now playing: Juan Karlos - Buwan </p>
    </div>

    <div class="night-scene">
      <div class="star s1"></div>
      <div class="star s2"></div>
      <div class="star s3"></div>
      <div class="star s4"></div>
      <div class="star s5"></div>
    </div>

    <div class="bg-hearts">
      <div class="bg-heart h1"></div>
      <div class="bg-heart h2"></div>
      <div class="bg-heart h3"></div>
      <div class="bg-heart h4"></div>
      <div class="bg-heart h5"></div>
      <div class="bg-heart h6"></div>
      <div class="bg-heart h7"></div>
      <div class="bg-heart h8"></div>
      <div class="bg-heart h9"></div>
      <div class="bg-heart h10"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="love letter 2.js"></script>
  </body>
</html>
